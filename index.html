<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM Welkomstbord - Ingang</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #030303; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff; overflow: hidden;
        }

        /* Chique bruine achtergrond voor betere werking op GitHub */
        .background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2b1d0e; 
            z-index: -1;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            width: 75vw;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-area h1 {
            font-size: 40px; letter-spacing: 6px; margin: 0;
            color: #d4c4a8; text-transform: uppercase;
        }

        .divider {
            height: 2px; width: 100px; background: #d4c4a8;
            margin: 25px auto;
        }

        .event-title {
            font-size: 32px; margin-bottom: 40px; font-weight: 300; line-height: 1.4;
        }

        .event-title strong { color: #fff; display: block; margin-top: 10px; font-size: 36px; }

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 30px; margin-bottom: 50px; text-align: left;
        }

        .info-item {
            padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.8s ease;
        }

        .info-item label {
            display: block; color: #d4c4a8; text-transform: uppercase;
            font-size: 13px; letter-spacing: 2px; margin-bottom: 10px;
        }

        .info-item span { font-size: 22px; font-weight: 500; }

        /* Stijl voor wanneer de lezing is gestart */
        .status-begonnen {
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.3);
        }
        .status-begonnen span { color: #ff453a; }

        .cta-area {
            display: flex; align-items: center; justify-content: center;
            gap: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px;
        }

        .qr-placeholder {
            width: 130px; height: 130px; background: #fff;
            padding: 10px; border-radius: 10px;
        }

        .cta-text { text-align: left; font-size: 17px; line-height: 1.5; color: #ccc; }
        .highlight { color: #d4c4a8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="welcome-card">
        <div class="logo-area">
            <h1>Yulfono Mshihoyo - Welkom!</h1>
            <img src="YulfonoMshihoyo.jpg" alt="YM Logo" style="height: 100px; width: auto; margin-top: 15px;">
            <div class="divider"></div>
        </div>

        <div class="event-title">
            <strong>The Shroud of Turin: <br></strong> Wat vertelt de Lijkwade over de kruisiging van onze Heer Jezus Christus?
        </div>

        <div class="info-grid">
            <div class="info-item" id="status-container">
                <label>Huidige Status</label>
                <span id="status-text">Inloop</span>
            </div>
            <div class="info-item">
                <label>Programma</label>
                <span>19:00 - 21:00 uur</span>
            </div>
        </div>

        <div class="cta-area">
            <div class="qr-placeholder">
                <img src="YMK_QR.png" alt="Scan Mij" style="width:100%; height:100%;">
            </div>
            <div class="cta-text">
                Scan de code en word lid van het <span class="highlight">Yulfono Mshihoyo Kanaal</span>!<br>
                Mis niets van de onthulling en <span class="highlight">unieke content</span>.
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATIE: Na 900 seconden (15 min) verandert de status.
        const secondenTotStart = 900; 

        setTimeout(function() {
            const statusBox = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');

            statusText.innerText = "De lezing is begonnen";
            statusBox.classList.add('status-begonnen');
            
        }, secondenTotStart * 1000);
    </script>

</body>
</html>
