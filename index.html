<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YM Welkomstbord - Ingang</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            /* De donkere sfeer-achtergrond is nu hier naartoe verplaatst */
            background: radial-gradient(circle at bottom center, #2b1d0e 0%, #050505 80%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff; overflow: hidden;
            position: relative; 
            touch-action: manipulation; 
            -webkit-user-select: none; 
            user-select: none;
        }

        /* --- NIEUW: De Kruisjes Achtergrond --- */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        
        .particle-cross {
            position: absolute; 
            color: rgba(212, 196, 168, 0.4); /* Subtiele goud/crème kleur */
            font-family: 'Times New Roman', Times, serif; 
            opacity: 0;
            user-select: none;
            /* Animatie voor faden en lichtjes zweven */
            animation: fadeCross var(--anim-duration) infinite ease-in-out;
            animation-delay: var(--anim-delay);
        }

        @keyframes fadeCross {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            50% { opacity: 1; transform: scale(1) translateY(-10px); text-shadow: 0 0 15px rgba(212, 196, 168, 0.6); }
            100% { opacity: 0; transform: scale(1.2) translateY(-30px); }
        }

        .overlay-dark {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: -1;
        }

        /* --- DE KAART EN INHOUD --- */
        .welcome-card {
            background: rgba(20, 15, 10, 0.6); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 50px; width: 75vw; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7); z-index: 10;
        }

        .logo-area h1 { font-size: 40px; letter-spacing: 6px; margin: 0; color: #d4c4a8; text-transform: uppercase; }
        .divider { height: 2px; width: 100px; background: #d4c4a8; margin: 25px auto; }
        .event-title { font-size: 32px; margin-bottom: 40px; font-weight: 300; line-height: 1.4; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .event-title strong { color: #fff; display: block; margin-top: 10px; font-size: 36px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 50px; text-align: left; }
        .info-item { padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.8s ease; }
        .info-item label { display: block; color: #d4c4a8; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; margin-bottom: 10px; }
        .info-item span { font-size: 22px; font-weight: 500; }

        .status-begonnen { background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.3); }
        .status-begonnen span { color: #ff453a; }

        .cta-area { display: flex; align-items: center; justify-content: center; gap: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px; }
        .qr-placeholder { width: 130px; height: 130px; background: #fff; padding: 10px; border-radius: 10px; }
        .cta-text { text-align: left; font-size: 17px; line-height: 1.5; color: #ccc; }
        .highlight { color: #d4c4a8; font-weight: bold; }

        /* --- Geheime Beheerder functionaliteit --- */
        .geheime-knop { position: absolute; top: 0; right: 0; width: 150px; height: 150px; z-index: 999; cursor: default; }
        .admin-menu { display: none; position: absolute; top: 20px; right: 20px; background-color: rgba(30, 41, 59, 0.95); padding: 25px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 1000; min-width: 250px; backdrop-filter: blur(10px);}
        .admin-btn { background-color: #334155; color: #f8fafc; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 12px; display: block; width: 100%; transition: background 0.2s;}
        .admin-btn:hover { background-color: #475569; }
        .admin-btn.geel { background-color: #d97706; margin-bottom: 20px; } 
        .admin-btn.geel:hover { background-color: #b45309; }

    </style>
</head>
<body onclick="startFullscreen()" oncontextmenu="return false;">

    <div class="geheime-knop" onclick="checkGeheimeKlik(event)"></div>

    <div class="particles" id="particles"></div>
    <div class="overlay-dark"></div>

    <div class="welcome-card">
        <div class="logo-area">
            <h1>Yulfono Mshihoyo - Welkom!</h1>
            <img src="LogoYM.jpg" alt="YM Logo" style="height: 100px; width: auto; margin-top: 15px;">
            <div class="divider"></div>
        </div>

        <div class="event-title">
            <strong>The Shroud of Turin: <br></strong> Wat vertelt de Lijkwade over de kruisiging van onze Heer Jezus Christus?
        </div>

        <div class="info-grid">
            <div class="info-item" id="status-container">
                <label>Huidige Status</label>
                <span id="status-text">Inloop</span>
            </div>
            <div class="info-item">
                <label>Programma</label>
                <span>19:00 - 21:00 uur</span>
            </div>
        </div>

        <div class="cta-area">
            <div class="qr-placeholder">
                <img src="YMK_QR.png" alt="Scan Mij" style="width:100%; height:100%;">
            </div>
            <div class="cta-text">
                Scan de code en word lid van het <span class="highlight">Yulfono Mshihoyo Kanaal</span>!<br>
                Mis niets van de onthulling en <span class="highlight">unieke christelijke content</span>.
            </div>
        </div>
    </div>

    <div class="admin-menu" id="admin-menu">
        <strong style="display: block; margin-bottom: 20px; color: #d4c4a8; font-size: 20px; font-weight: 400; text-transform: uppercase;">Beheerdersmenu</strong>
        
        <button class="admin-btn geel" id="fullscreen-btn" onclick="toggleFullscreen()">🔲 Uit Fullscreen gaan</button>
        <button class="admin-btn" onclick="sluitAdmin()">❌ Sluit Paneel</button>
    </div>

    <script>
        // --- JS: Genereer fading kruisjes ---
        const container = document.getElementById('particles');
        const numCrosses = 70; // Pas dit getal aan voor meer of minder kruisjes

        for(let i = 0; i < numCrosses; i++) {
            let cross = document.createElement('div');
            cross.className = 'particle-cross';
            cross.innerText = '✝'; 
            
            cross.style.left = Math.random() * 100 + 'vw';
            cross.style.top = Math.random() * 100 + 'vh';
            
            const fontSize = Math.floor(Math.random() * 20) + 16;
            cross.style.fontSize = fontSize + 'px';
            
            const duration = (Math.random() * 6 + 6) + 's';
            cross.style.setProperty('--anim-duration', duration);
            
            const delay = (Math.random() * 10) + 's';
            cross.style.setProperty('--anim-delay', delay);
            
            container.appendChild(cross);
        }

        // --- Fullscreen & Admin Logica ---
        let hasStartedFullscreen = false;

        function startFullscreen() {
            if (!hasStartedFullscreen) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // Safari
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } // IE11
                hasStartedFullscreen = true;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
                document.getElementById('fullscreen-btn').innerText = "🔲 Uit Fullscreen gaan";
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                document.getElementById('fullscreen-btn').innerText = "🔲 In Fullscreen gaan";
                hasStartedFullscreen = false; 
            }
        }

        let klikTeller = 0;
        let klikTimer;

        function checkGeheimeKlik(event) {
            event.stopPropagation(); 
            klikTeller++;
            clearTimeout(klikTimer);
            klikTimer = setTimeout(() => { klikTeller = 0; }, 2000);

            if (klikTeller >= 5) {
                klikTeller = 0; 
                let pin = prompt("Pincode (Beheer):");
                if (pin === "0000") {
                    document.getElementById('admin-menu').style.display = 'block';
                }
            }
        }

        function sluitAdmin() { document.getElementById('admin-menu').style.display = 'none'; }

        // --- Status Timer Logica ---
        const secondenTotStart = 1800; 

        setTimeout(function() {
            const statusBox = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');

            statusText.innerText = "De lezing is begonnen";
            statusBox.classList.add('status-begonnen');
            
        }, secondenTotStart * 1000);
    </script>
</body>
</html>
