<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM Welkomstbord - Ingang</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #030303; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff; overflow: hidden;
        }

        /* Solide bruine achtergrond ipv afbeelding */
        .background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2b1d0e; /* De YM Bruine kleur */
            z-index: -1;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            width: 70vw;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-area h1 {
            font-size: 50px; letter-spacing: 8px; margin: 0;
            color: #d4c4a8; text-transform: uppercase;
        }

        .divider {
            height: 2px; width: 100px; background: #d4c4a8;
            margin: 30px auto;
        }

        .event-title {
            font-size: 38px; margin-bottom: 40px; font-weight: 300;
        }

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 30px; margin-bottom: 50px; text-align: left;
        }

        .info-item {
            padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px;
            transition: all 0.5s ease;
        }

        .info-item label {
            display: block; color: #d4c4a8; text-transform: uppercase;
            font-size: 14px; letter-spacing: 2px; margin-bottom: 10px;
        }

        .info-item span { font-size: 24px; font-weight: 500; transition: color 0.5s ease; }

        .cta-area {
            display: flex; align-items: center; justify-content: center;
            gap: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px;
        }

        .qr-placeholder {
            width: 150px; height: 150px; background: #fff;
            padding: 10px; border-radius: 10px;
        }

        .cta-text { text-align: left; font-size: 18px; line-height: 1.5; }
        .highlight { color: #d4c4a8; font-weight: bold; }
        
        /* Stijl voor wanneer het begonnen is */
        .status-begonnen { 
            border: 1px solid rgba(255, 69, 58, 0.5);
            background: rgba(255, 69, 58, 0.1);
        }
        .status-begonnen span { color: #ff453a; } 
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="welcome-card">
        <div class="logo-area">
            <h1>Yulfono Mshihoyo</h1>
            <img src="YM_DONE.jpg" alt="YM Logo" style="height: 120px; width: auto; margin-bottom: 10px;">
            <div class="divider"></div>
        </div>

        <div class="event-title">Welkom bij de lezing: <br><strong>The Shroud of Turin</strong></div>

        <div class="info-grid">
            <div class="info-item" id="status-container">
                <label>Status</label>
                <span id="status-text">De inloop is begonnen</span>
            </div>
            <div class="info-item">
                <label>Start Programma</label>
                <span>19:00 uur (Stipt)</span>
            </div>
        </div>

        <div class="cta-area">
            <div class="qr-placeholder">
                <img src="YMK_QR.png" alt="Scan Mij" style="width:100%; height:100%;">
            </div>
            <div class="cta-text">
                Scan de code om lid te worden van het <span class="highlight">Yulfono Mshihoyo Kanaal</span>.<br>
                Mis niets en neem deel aan <span class="highlight">unieke content</span>.
            </div>
        </div>
    </div>

<script>
    // CONFIGURATIE:
    const secondenTotStart = 900; // 15 min (900 seconden)

    setTimeout(function() {
        const statusBox = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');

        // Wijzig de tekst
        statusText.innerText = "De lezing is begonnen!";

        // Pas de visuele stijl aan (rood/opvallend)
        statusBox.classList.add('status-begonnen');
        
        console.log("Status gewijzigd naar Begonnen");
    }, secondenTotStart * 1000);
</script>

</body>
</html>
